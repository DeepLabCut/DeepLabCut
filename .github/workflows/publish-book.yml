name: publish-book

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-book.yml
    with:
      python-version: "3.10"
      build_dir: "./_build/html"
      upload_artifact: true
    secrets: inherit

  deploy-dev-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # mike needs full history to read/write gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies for mkdocs-material social plugin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install developer docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev-docs]"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev-docs with mike
        run: |
          VERSION=$(python -c "import deeplabcut; v=deeplabcut.__version__; print('.'.join(v.split('.')[:2]))")
          mike deploy --push --update-aliases \
            --config-file dev-docs/mkdocs.yml \
            --deploy-prefix dev \
            "$VERSION" latest
          mike set-default --push \
            --config-file dev-docs/mkdocs.yml \
            --deploy-prefix dev \
            latest

  deploy-main-docs:
    needs: [build, deploy-dev-docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built Jupyter Book artifact
        uses: actions/download-artifact@v4
        with:
          name: built-book
          path: site

      - name: Deploy main docs via gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: true  # preserve /dev/ tree managed by mike
