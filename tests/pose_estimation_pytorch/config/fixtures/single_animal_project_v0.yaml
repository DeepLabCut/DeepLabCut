# Config schema version. Do not edit manually.
config_version: 0
# Project definitions (do not edit)
Task: openfield
scorer: test
date: Oct30
multianimalproject: false
identity: false

# Project path (change when moving around)
project_path: /test/fixtures/single_animal_project_v0

# Default DeepLabCut engine to use for shuffle creation (either pytorch or tensorflow)
engine: pytorch

# Annotation data set configuration (and individual video cropping parameters)
video_sets:
  /test/fixtures/single_animal_project_v0/videos/m1s1.mp4:
    crop: 0, 640, 0, 480
  /test/fixtures/single_animal_project_v0/videos/m1s2.mp4:
    crop: 0, 640, 0, 480
bodyparts:
- snout
- leftear
- rightear
- tailbase

# Fraction of video to start/stop when extracting frames for labeling/refinement
start: 0.0
stop: 1.0
numframes2pick: 20

# Plotting configuration
skeleton: []
skeleton_color: black
pcutoff: 0.4
dotsize: 8
alphavalue: 0.7
colormap: jet

# Training,Evaluation and Analysis configuration
TrainingFraction:
- 0.95
iteration: 0
default_net_type: resnet_50
default_augmenter: default
snapshotindex: -1
detector_snapshotindex: -1
batch_size: 4
detector_batch_size: 1

# Cropping Parameters (for analysis and outlier frame detection)
cropping: false
# if cropping is true for analysis, then set the values here:
x1: 0
x2: 640
y1: 0
y2: 480

# Refinement configuration (parameters from annotation dataset configuration also relevant in this stage)
corner2move2:
- 50
- 50
move2corner: true

# Conversion tables to fine-tune SuperAnimal weights
SuperAnimalConversionTables:

# These are very old parameters that are no longer used They are simply ignored.
resnet:
croppedtraining:
