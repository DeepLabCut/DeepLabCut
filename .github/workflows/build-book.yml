name: Build (and optionally deploy) Jupyter Book

on:
  workflow_call:
    inputs:
      publish:
        description: "If true, deploy the built site to GitHub Pages."
        required: false
        default: false
        type: boolean
      python-version:
        description: "Python version used to build the docs."
        required: false
        default: "3.10"
        type: string
      build_dir:
        description: "Directory containing the built static site."
        required: false
        default: "./_build/html"
        type: string

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[docs]
          pip install jupyter-book==1.0.4.post1 sphinxcontrib-mermaid

      - name: Build the book
        run: |
          jupyter-book build .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.build_dir }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      pages: write       
      id-token: write    
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4