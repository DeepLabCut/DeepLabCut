repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: name-tests-test
      - id: trailing-whitespace
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.15.2
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
  - repo: https://github.com/psf/black
    rev: 22.3.0
    hooks:
      - id: black
        language_version: python3
  - repo: local
    hooks:
      - id: dlc-docs-notebooks-check
        name: DLC docs+notebooks staleness/check + nbformat validate + normalization
        entry: python .github/tools/docs_and_notebooks_check.py check --config .github/tools/docs_and_notebooks_report_config.yml --targets
        language: python
        pass_filenames: true
        types_or: [jupyter, markdown]
        additional_dependencies:
          - "pydantic>=2,<3"
          - "pyyaml"
          - "nbformat>=5"

