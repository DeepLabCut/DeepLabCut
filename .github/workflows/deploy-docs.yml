name: Docs / Deploy docs (main + dev-docs main)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-main-docs:
    uses: ./.github/workflows/build-main-docs.yml
    with:
      python-version: "3.10"
      build_dir: "./_build/html"
      upload_artifact: true
    secrets: inherit

  deploy-main-docs:
    needs: build-main-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built Jupyter Book artifact
        uses: actions/download-artifact@v4
        with:
          name: built-book
          path: site

      - name: Deploy main docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: true

  deploy-dev-docs-main:
    needs: deploy-main-docs
    uses: ./.github/workflows/deploy-dev-docs-mike.yml
    with:
      action: deploy
      version_label: main
      aliases: ""
      default_label: ""
      python-version: "3.10"
      config-file: dev-docs/mkdocs.yml
      deploy-prefix: dev
    secrets: inherit
